<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor | Aryan Kedar</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>

    <div class="conatiner">
        <h1 class="main-heading">Currency Convertor</h1>

        <form>

            <div class="amount m-3">
                <label class="form-label p-3">Enter Amount</label>
                <input type="text" id="inputPassword5" class="amount-input">
            </div>

            <div class="dropdown m-3">

                <div class="optional from">
                    <label class="form-label form-heading from-heading mx-4">FROM</label>
                    <div class="option-selector ">
                        <div class="img-option"></div>
                        <img src="https://flagsapi.com/IN/flat/64.png" class="img-conatainer">
                        <select class="option-select" name="from">
                            <!-- <option value="IN" selected>IN</option> -->
                        </select>
                    </div>

                </div>

                <div class="icon"><i class="fa-solid fa-arrow-right-arrow-left fa-xl"></i></div>

                <div class="optional to">
                    <label class="form-label form-heading from-heading mx-4">TO</label>
                    <div class="option-selector ">
                        <img src="https://flagsapi.com/US/flat/64.png" class="img-conatainer">
                        <select class="option-select" name="to">
                            <!-- <option value="US" selected>US</option> -->
                        </select>
                    </div>
                </div>

            </div>

            <div class="buttons m-3">
                <button type="button" class="btn m-3 px-5">Get Exchange</button>
            </div>


        </form>

    </div>

    <script src="countries.js"></script>
    <script src="app.js"></script>
</body>

</html>
